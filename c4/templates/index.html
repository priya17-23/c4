<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload CSV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <div class="top-nav">
            <a class="brand" href="{{ url_for('dashboard') }}"> Analytics Hub</a>
            <div class="nav-links">
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('about') }}">About</a>
            </div>
        </div>

        <section class="hero-card">
            <h1 class="hero-title">Upload your CSV and start analysis</h1>
            <p class="hero-subtitle">Your file is analyzed automatically with tables, stats, and custom chart options.</p>
        </section>

        <section class="panel-card">
            <form method="POST" enctype="multipart/form-data" class="upload-grid">
                <div>
                    <label class="form-label" for="fileInput">CSV File</label>
                    <input id="fileInput" type="file" class="form-control" name="file" accept=".csv" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Analyze File</button>
            </form>

            <div class="footer">
                Built with ❤️ by Priya • Powered by Flask, Pandas, and Plotly
            </div>
        </section>
    </div>
    <script src="{{ url_for('static', filename='ui.js') }}"></script>
</body>
</html>
