<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <div class="top-nav">
            <a class="brand" href="{{ url_for('dashboard') }}"> Analytics Hub</a>
            <div class="nav-links">
                <a href="{{ url_for('result', filename=filename) }}">Back to Analysis</a>
                <a href="{{ url_for('index') }}">Upload New File</a>
            </div>
        </div>

        <section class="hero-card">
            <h3 class="hero-title">Chart: <span class="text-primary">{{ chart_type }}</span></h3>
            <p class="text-muted mb-3">
                File: <strong>{{ filename }}</strong> • X: <strong>{{ x_col }}</strong> • Y: <strong>{{ y_col }}</strong>
            </p>
        </section>

        <section class="panel-card">
            <div>
                {{ plot_html | safe }}
            </div>

            <a href="{{ url_for('result', filename=filename) }}" class="btn btn-secondary mt-3 w-100">
                Back to analysis
            </a>

            <div class="footer">
                Powered by Flask, Pandas, and Plotly
            </div>
        </section>
    </div>
    <script src="{{ url_for('static', filename='ui.js') }}"></script>
</body>
</html>
